# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "prompt-autotuner"

[setup]
script = '''
command -v pnpm >/dev/null || npm install -g pnpm
pnpm install
cp -n .env.ai-ready .env 2>/dev/null || true
pnpm build
'''

[[actions]]
name = "run"
icon = "debug"
command = '''
check_port() {
  if lsof -i :"$1" >/dev/null 2>&1; then return 1; else return 0; fi
}

PORT=3000
while ! check_port $PORT; do
  echo "⚠️  Port $PORT in use, trying $((PORT+1))..."
  PORT=$((PORT+1))
done

API_PORT=$((PORT+1))
while ! check_port $API_PORT; do
  echo "⚠️  Port $API_PORT in use, trying $((API_PORT+1))..."
  API_PORT=$((API_PORT+1))
done

echo "🚀 Frontend: $PORT, API: $API_PORT"
PORT=$PORT API_PORT=$API_PORT pnpm dev
'''

[[actions]]
name = "build"
icon = "tool"
command = "pnpm build"

[[actions]]
name = "lint"
icon = "tool"
command = '''
npx tsc --noEmit
npx eslint . --max-warnings=50
'''

[[actions]]
name = "setup"
icon = "tool"
command = '''
command -v pnpm >/dev/null || npm install -g pnpm
rm -rf node_modules/
pnpm install
cp .env.ai-ready .env 2>/dev/null || true
pnpm build
'''
