name: Release Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-bump-main
  cancel-in-progress: false

jobs:
  release-bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint . --max-warnings=50

      - name: Build
        run: pnpm build

      - name: Bump patch version
        id: bump
        run: pnpm release:version patch

      - name: Commit and push release version
        env:
          RELEASE_TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${RELEASE_TAG} [skip ci]"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin HEAD:main "${RELEASE_TAG}"
